                    <!--begin::Signin-->
                    <div class="login-form login-signin">

                            <!--end::Form group-->

                                           type="password"
                                           name="password"

                                    Submit
                                </button>
                                <div>
                                    <i class="fa-solid fa-bell pr-1" style="color: #3699FF"></i><span>Do you want Join in our Q-Network , Reach us : <div><a target="_blank" href="mailto:contact@pioneerfoods.in">contact@pioneerfoods.in</a> , <a target="_blank" href="tel:7337441144">+917337441144</a></div>

                                </div>
                            </div>
                            <!--end::Action-->
                        </form>

                    </div>

                    <!--begin::Signup-->
                    <div class="login-form login-signup">

                                <h3 class="font-weight-bolder text-dark font-size-h4 font-size-h1-lg">Sign Up</h3>

    <script type="module" src="/js/Client/client_resetpassword.js"></script>
    <!--eye icon-->
    <script>
        function togglePassword1() {
            const passwordField = document.getElementById("clientPassword1");
            const eyeIcon = document.getElementById("eyeIcon1");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }
        function togglePassword2() {
            const passwordField = document.getElementById("clientPassword2");
            const eyeIcon = document.getElementById("eyeIcon2");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }
    </script>
