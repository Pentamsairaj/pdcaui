<!DOCTYPE html>
<html lang="en">
<!--begin::Head-->

<head>

    <meta charset="utf-8" />
    <title>PDCA4M | Team Login </title>
    <meta name="description" content="Login page example" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <!--begin::Fonts-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--end::Fonts-->
    <!--begin::Page Custom Styles(used by this page)-->
    <link href="../theme/css/pages/login/login-11036.css" rel="stylesheet" type="text/css" />
    <!--end::Page Custom Styles-->
    <!--begin::Global Theme Styles(used by all pages)-->
    <link href="../theme/plugins/global/plugins.bundle1036.css" rel="stylesheet" type="text/css" />
    <link href="../theme/plugins/custom/prismjs/prismjs.bundle1036.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/style.bundle1036.css" rel="stylesheet" type="text/css" />

    <!-- TOASTIFY -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!--end::Global Theme Styles-->
    <!--begin::Layout Themes(used by all pages)-->
    <link href="../theme/css/themes/layout/header/base/light.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/themes/layout/header/menu/light.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/themes/layout/brand/dark.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/themes/layout/aside/dark.css" rel="stylesheet" type="text/css" />
    <!--end::Layout Themes-->
    <link rel="shortcut icon" href="../theme/favicon/logo.ico" />
    <style>
        .contactus {
            position: absolute;
            transform: translate(350px,540px);
        }
    </style>
</head>
<!--end::Head-->
<!--begin::Body-->

<body id="kt_body"
      class="bg-white quick-panel-right demo-panel-right offcanvas-right header-fixed header-mobile-fixed subheader-enabled aside-enabled aside-fixed aside-minimize-hoverable page-loading">
    <!--begin::Main-->

    <div class="d-flex flex-column flex-root">
        <!--begin::Login-->
        <div class="login login-1 login-signin-on d-flex flex-column flex-lg-row flex-column-fluid bg-white"
             id="kt_login">
            <!--begin::Aside-->
            <div class="login-aside"
                 style="margin:150px 0px 0px 150px; background: url('./theme/images/pdca4m-logo-1.png'); background-repeat:no-repeat; background-size: contain; ">
                <!--begin::Aside Top-->
                <!--end::Aside Bottom-->
            </div>
            <!--begin::Aside-->
            <!--begin::Content-->
            <div class="login-content flex-row-fluid d-flex flex-column justify-content-center position-relative overflow-hidden p-7 mx-auto">
                <!--begin::Content body-->
                <div class="d-flex flex-column-fluid flex-center">
                    <!--begin::Signin-->
                    <div class="login-form login-signin">
                        <!--begin::Form-->
                        <form class="form" id="kt_login_signin_form" onsubmit="return false">
                            <!--begin::Title-->
                            <div class="pb-13 pt-lg-0 pt-5">
                                <h3 class="font-weight-bolder text-dark font-size-h4 font-size-h1-lg">
                                    Welcome to Food<br />
                                    Compliance Management
                                </h3>

                            </div>
                            <!--begin::Title-->
                            <!--begin::Form group-->
                            <div class="form-group">
                                <label class="font-size-h6 font-weight-bolder text-dark">Email</label>
                                <input class="form-control form-control-solid h-auto p-6 rounded-lg" id="adminUserName"
                                       type="text" name="username" autocomplete="off" />
                            </div>
                            <!--end::Form group-->
                            <!--begin::Form group-->
                            <div class="form-group">
                                <div class="d-flex justify-content-between mt-n5">
                                    <label class="font-size-h6 font-weight-bolder text-dark pt-5">Password</label>
                                    <a href="Forgotpassword.html" class="text-primary font-size-h6 font-weight-bolder text-hover-primary pt-5" id="kt_login_forgot">Forgot Password ?</a>
                                </div>

                                <div class="position-relative">
                                    <input class="form-control form-control-solid h-auto p-6 rounded-lg pr-12"
                                           type="password"
                                           name="password"
                                           id="adminPassword"
                                           autocomplete="off" />

                                    <!-- Eye Icon -->
                                    <span onclick="togglePassword()"
                                          style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer;">
                                        <i id="eyeIcon" class="fa fa-eye"></i>
                                    </span>
                                </div>
                            </div>
                            <!--end::Form group-->
                            <!--begin::Action-->
                            <div class="pb-lg-0 pb-5">
                                <button type="submit" id="kt_login_signin_submit"
                                        class="btn btn-primary font-weight-bolder font-size-h6 px-8 py-4 my-3 mr-3">
                                    Sign
                                    In
                                </button>
                                <div>
                                    <i class="fa-solid fa-bell pr-1" style="color: #3699FF"></i><span>For Annual Subscription Reach us : <div><a target="_blank" href="mailto:contact@pioneerfoods.in">contact@pioneerfoods.in</a> , <a target="_blank" href="tel:7337441144">+91-7337441144</a></span>
                                </div>

                            </div>
                        </form>
                    </div>
                    <!--end::Action-->
                    <!--end::Form-->
                </div>
            </div>
            <!--end::Signin-->
        </div>
        <!--end::Content body-->
    </div>
    <!--begin::SPINNER-->
    <div id="spinnerOverlay">
        <div class="loaders"></div>
    </div>
    <!--end::SPINNER-->
    <!--end::Main-->
    <!--begin::Global Theme Bundle(used by all pages)-->
    <script src="./theme/plugins/global/plugins.bundle1036.js?v=2.1.1"></script>
    <script src="./theme/plugins/custom/prismjs/prismjs.bundle1036.js?v=2.1.1"></script>
    <!-- <script src="./theme/js/scripts.bundle1036.js"></script> -->
    <!-- TOASTIFY -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!--end::Global Theme Bundle-->
    <!--begin::Page Scripts(used by this page)-->
    <script type="module" src="./js/login.js"></script>
    <!--eye icon-->
    <script>
        function togglePassword() {
            const passwordField = document.getElementById("adminPassword");
            const eyeIcon = document.getElementById("eyeIcon");

            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        }
    </script>
    <!--end::Page Scripts-->
</body>
<!--end::Body-->

</html>
