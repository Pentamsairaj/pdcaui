        .quick-links {
            display: flex;
            gap: 12px;
            margin-top: 15px;

        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            background: #f3f6f9;
            color: #3699FF;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

            .quick-link i {
                font-size: 14px;
            }

            .quick-link:hover {
                background: #3699FF;
                color: #fff;
                border-color: #3699FF;
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(54, 153, 255, 0.25);
            }

        /* ----- Enhanced Login Toggle Styles (Team Active) ----- */
        .login-tabs {
            display: flex;
            gap: 20px;
            background: #f8f9fc;
            padding: 6px;
            border-radius: 60px;
            width: fit-content;
            margin-bottom: 25px;
            border: 1px solid #e9ecef;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .login-tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.3px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: transparent;
            color: #5b6e8c;
            border: none;
            cursor: pointer;
        }

            /* Active Team tab - vibrant primary style (greenish-blue to match team theme) */
            .login-tab.active-team {
                background: linear-gradient(105deg, #2c7be5 0%, #1a68d1 100%);
                color: white !important;
                box-shadow: 0 8px 18px rgba(44, 123, 229, 0.28);
                transform: translateY(-1px);
            }

            /* Inactive client tab */
            .login-tab.inactive-client {
                background: #ffffff;
                color: #3f4d67;
                border: 1px solid #e2e8f0;
            }

                .login-tab.inactive-client:hover {
                    background: #eff3f9;
                    color: #3699FF !important;
                    border-color: #cddfef;
                    transform: translateY(-1px);
                }

            .login-tab i {
                font-size: 1.1rem;
            }

            color: white;
        }

        .inactive-client i {
            color: #5b6e8c;
        }

        .inactive-client:hover i {
            color: #3699FF;
        }

            font-size: 0.85rem;
            background: linear-gradient(135deg, #eef4ff 0%, #e8f0fe 100%);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 40px;
            color: #2c7be5;
            font-weight: 600;
            margin-top: 12px;
            border: 1px solid rgba(44, 123, 229, 0.15);
        }

        .welcome-title {
            margin-bottom: 0.25rem;
        }

        .contact-info {
           
            padding-top: 12px;
        }

                color: #3699FF;
                margin-right: 6px;
            }

                color: #3699FF;
                font-weight: 500;

                                    <a href="https://pdcaaudit.in/" target="_blank" class="quick-link">
                                        <i class="fa fa-file-alt"></i>
                                        <span>PDCA Audit.in</span>
                                    </a>
                                    
                                </div>
                            </div>
                        </form>
                        <!--end::Form-->

    <style>
        /* Active team tab specific - visual enhancement */

            position: relative;
            background: linear-gradient(105deg, #2c7be5 0%, #1a68d1 100%);

        /* Role hint team specific glow */

            animation: subtlePulse 2s infinite;
        }

            0%, 100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        /* Quick links enhancement */
