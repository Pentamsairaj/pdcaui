            <!--begin::Aside-->
            <div class="aside aside-left aside-fixed d-flex flex-column flex-row-auto" id="kt_aside"></div>
            <!--end::Aside-->

            <div class="d-flex flex-column flex-row-fluid wrapper" id="kt_wrapper">

                <!--begin::Header-->
                <div id="kt_header" class="header header-fixed"> </div>
                <!--end::Header-->
                <!--begin::Content-->
                <div class="content d-flex flex-column flex-column-fluid" id="kt_content">
                    <!--begin::Subheader-->
                    <div class="subheader py-6 py-lg-8 subheader-transparent" id="kt_subheader">
                        <div class="container d-flex align-items-center justify-content-between flex-wrap flex-sm-nowrap">
                            <!--begin::Info-->
                            <div class="d-flex align-items-center flex-wrap mr-1">
                                <!--begin::Page Heading-->
                                <div class="d-flex align-items-baseline flex-column flex-wrap mr-5">
                                    <!--begin::Page Title-->
                                    <h3 class="text-dark font-weight-bold my-1 mr-5">New Job for Client</h3>
                                    <!--end::Page Title-->
                                    <!--begin::Breadcrumb-->
                                    <ul class="breadcrumb breadcrumb-transparent breadcrumb-dot font-weight-bold p-0 my-2 font-size-sm">
                                        <li class="breadcrumb-item text-muted">

                                        <li class="breadcrumb-item text-muted">

                                    <!--end::Breadcrumb-->

                            <!--end::Info-->

                        </div>
                    </div>
                    <!--end::Subheader-->
                    <!--begin::Entry-->
                    <div class="d-flex flex-column-fluid">
                        <!--begin::Container-->
                        <div class="container">
                            <!--begin:: FROM TO Details-->
                            <div class="card mb-7">
                                <div class="card-body">
                                    <div class="row">

                                        <div class="col-md-3">
                                            <div class="form-group">
                                                <label for="" class="font-weight-bold">
                                                    Client User ID <sup class="text-danger">*</sup>
                                                </label>
                                                <input type="text" name="" readonly id="txtclientid" class="form-control"
                                                       placeholder="PDCA00001">
                                            </div>
                                        </div>
                                        <input type="hidden" id="inputhidden" value="" />
                                        <div class="col-md-3">
                                            <div class="form-group">
                                                <br />
                                                <input type="text" id="txtjobid" readonly class="form-control"
                                                       placeholder="RPDCA00001-01">
                                            </div>
                                        </div>
                                    </div>
                                    <br>
                                    <div class="row">
                                        <div class="col-md-12">
                                            <div class="form-group">
                                                <label for="" class="font-weight-bold">Company Name:</label>
                                                <input type="text" readonly id="txtcompanyname" class="form-control">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!--end::FROM TO Details-->
                            <!--begin:: Pricing Details-->
                            <div class="card mb-7">
                                <div class="card-header">
                                    <h6 class="card-title font-weight-bolder mb-0">Regulatory Documents</h6>
                                </div>
                                <div class="card-body">
                                    <table class="table" id="pricingTable">
                                        <thead class="thead-dark">
                                            <tr>
                                                <th scope="col">S.no</th>
                                                <th scope="col">Name of the Document</th>
                                                <th scope="col">Modal Format</th>
                                                <th scope="col">Client Upload <br /> Document (PDF)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td class="text-center" id="col0">
                                                    <span class="btn btn-outline-primary border-0 addRow">
                                                        <i class="fas fa-plus-circle"></i>
                                                    </span>
                                                </td>
                                                <td id="col1">
                                                    <input type="text" name="" placeholder="document name" class="form-control txtdocname">
                                                </td>
                                                <td id="col2">
                                                    <div class="row">
                                                        <div class="col-md-6">

                                                            <input type="file" id="fileupload"
                                                                   class="form-control">
                                                        </div>
                                                        <div class="col-md-6">
                                                            <span class="switch switch-primary">
                                                                <label>
                                                                    <input type="checkbox" id="chk" name="select" />
                                                                    <span></span>
                                                                </label>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td>
                                                </td>
                                                <td></td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <br><hr /><br>
                                    <div id="dvService">
                                        <div class="row">
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <label class="font-weight-bold">Licence copy upload:</label>
                                                    <div class="input-group">
                                                        <input type="file"
                                                               id="fileuploadli"
                                                               name="fileuploadli" disabled>
                                                    </div>
                                                    <input type="hidden" name="name" value="" id="licenseid" disabled />
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <label for="frmdate" class="font-weight-bold">Licence Issued On(validity)</label>
                                                    <input type="date" name="frmdate" id="frmdate" class="form-control" disabled>
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <label for="todate" class="font-weight-bold">Licence Due Date(validity)</label>
                                                    <input type="date" name="todate" id="todate" class="form-control" disabled>
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="form-group">
                                                    <label class="font-weight-bold">Annual Filling upload:</label>
                                                    <div class="input-group">
                                                        <input type="file"
                                                               id="annualFilling" accept=".pdf"
                                                               name="annualFilling" disabled>
                                                    </div>
                                                    <div class="my-2" id="annualfillingdoc_view"></div>
                                                    <input type="hidden" name="name" value="" id="annual" disabled/>
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <label for="fillingDate" class="font-weight-bold">Annual Filling Date(validity)</label>
                                                    <input type="date" name="fillingDate" id="fillingDate" disabled class="form-control">
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <label for="dueDate" class="font-weight-bold">Annual Due Date(validity)</label>
                                                    <input type="date" name="dueDate" id="dueDate" disabled class="form-control">
                                                </div>
                                            </div>


                                            <br><br>
                                            <div class="col-md-4">
                                                <div class="form-group">
                                                    <label for="txtperson" class="font-weight-bold">PDCA Contact Person(For Queries)</label>
                                                    <input type="text" name="txtperson" id="txtperson" disabled class="form-control">
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="form-group">
                                                    <label for="txtemail" class="font-weight-bold">Email</label>
                                                    <input type="email" name="txtemail" id="txtemail" disabled class="form-control">
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="form-group">
                                                    <label for="txtphone" class="font-weight-bold">Contact No:</label>
                                                    <input type="number" name="txtphone" id="txtphone" disabled class="form-control">
                                                </div>
                                            </div>
                                            <div class="col-md-3">
                                                <div class="form-group">
                                                    <br />
                                                    <button id="btnupdate" class="btn btn-success" disabled>Update</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!--end::Pricing Details-->

                            <h6 class="text-danger text-center font-weighter-bolder">Once it is saved, It is not editable for Customer</h6>
                            <br>


                            <div class="buttons-list d-flex justify-content-end">

                                <button class="p-5 m-5 btn btn-bg-white text-primary font-weight-bolder text-hover-danger shadow-sm">
                                    Cancel
                                </button>
                                <button class="p-5 m-5 btn btn-primary" id="btnsave">Save</button>
                            </div>
                        </div>
                        <!--end::Container-->
                    </div>
                    <!--end::Entry-->
                </div>
                <!--end::Content-->

            </div>
            <!--end::Wrapper-->
