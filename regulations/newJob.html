                                    <!--end::Page Title-->
                                    <!--begin::Breadcrumb-->
                                    <ul class="breadcrumb breadcrumb-transparent breadcrumb-dot font-weight-bold p-0 my-2 font-size-sm">
                                        <li class="breadcrumb-item text-muted">

                                        </li>
                                        <li class="breadcrumb-item text-muted">

                                        </li>
                                    </ul>
                                    <!--end::Breadcrumb-->
                                </div>
                                <!--end::Page Heading-->
                            </div>
                            <!--end::Info-->
                            <div class="form-group">
                                <label class="font-weight-bold">
                                    Selection of Checklist Template:<sup class="text-danger">*</sup>
                                </label>
                                <select class="form-control" id="ddlchecklist">
                                </select>
                            </div>
                        </div>
                    </div>
                    <!--end::Subheader-->
                    <!--begin::Entry-->
                    <div class="d-flex flex-column-fluid">
                        <!--begin::Container-->
                        <div class="container">
                            <!--begin:: FROM TO Details-->
                            <div class="card mb-7">
                                <div class="card-body">
                                    <div class="row">

                                        <div class="col-md-5">
                                            <div class="form-group">
                                                <label for="" class="font-weight-bold">
                                                    Client <sup class="text-danger">*</sup>
                                                </label>

                                                <select class="form-control" required id="txtclientid">
                                                </select>
                                            </div>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="form-group">
                                                <label for="ddljobno" class="font-weight-bold">Job No</label>
                                                <select name="ddljobno" id="ddljobno" class="form-control">
                                                    <option value="1">1</option>
                                                    <option value="2">2</option>
                                                    <option value="3">3</option>
                                                    <option value="4">4</option>
                                                    <option value="5">5</option>
                                                    <option value="6">6</option>
                                                    <option value="7">7</option>
                                                    <option value="8">8</option>
                                                    <option value="9">9</option>
                                                    <option value="10">10</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="col-md-4">
                                            <div class="form-group">
                                                <label class="font-weight-bold">Employee</label>
                                                <select name="ddlEmployee" id="ddlEmployee" required class="form-control">
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <br>

                                </div>
                            </div>
                            <!--end::FROM TO Details-->
                            <!--begin:: Pricing Details-->
                            <div class="card mb-7">
                                <div class="card-header">
                                    <h6 class="card-title font-weight-bolder mb-0">Regulatory Documents</h6>
                                </div>
                                <div class="card-body">
                                    <table class="table" id="pricingTable">
                                        <thead class="thead-dark">
                                            <tr>
                                                <th scope="col">New Record</th>
                                                <th scope="col">Name of the Document<span class="text-danger"> (Max 200 Characters)</span></th>
                                                <th scope="col">Modal Format</th>
                                                <th scope="col">Client Upload <br /> Document</th>
                                                <th scope="col">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr>
                                                <td class="text-center">
                                                    <span class="btn btn-outline-primary border-0 addRow">
                                                        <i class="fas fa-plus-circle"></i>
                                                    </span>
                                                </td>
                                                <td>
                                                    <textarea type="text" name="" placeholder="document name" class="form-control txtdocname" style="width:400px"></textarea>
                                                </td>
                                                <td>
                                                    <input type="file" id="fileupload"
                                                           class="form-control">
                                                </td>
                                                <td>
                                                    <span class="switch switch-primary">
                                                        <label>
                                                            <input type="checkbox" id="chk" name="select" />
                                                            <span></span>
                                                        </label>
                                                    </span>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <!--end::Pricing Details-->

                            <h6 class="text-danger text-center font-weighter-bolder">Once it is saved, It is not editable for Customer</h6>
                            <br>
                            <div class="buttons-list d-flex justify-content-end">
                                <button class="btn btn-secondary" onclick="history.back()" type="button">
                                    Cancel
                                </button>
                                <button class="p-5 m-5 btn btn-primary" id="btnsave" type="submit">Submit</button>
                            </div>
                        </div>
                        <!--end::Container-->
                    </div>
                    <!--end::Entry-->
                </div>
                <!--end::Content-->

            </div>
            <!--end::Wrapper-->
        </div>
        <!--end::Page-->
