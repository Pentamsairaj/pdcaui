<!DOCTYPE html>
<html lang="en">
<!--begin::Head-->

<head>

    <meta charset="utf-8" />
    <title>PDCA4M | Client Login</title>
    <meta name="description" content="Login page example" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <!--begin::Fonts-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700" />
    <!--end::Fonts-->
    <!--begin::Page Custom Styles(used by this page)-->
    <link href="../theme/css/pages/login/login-11036.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--end::Page Custom Styles-->
    <!--begin::Global Theme Styles(used by all pages)-->
    <link href="../theme/plugins/global/plugins.bundle1036.css" rel="stylesheet" type="text/css" />
    <link href="../theme/plugins/custom/prismjs/prismjs.bundle1036.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/style.bundle1036.css" rel="stylesheet" type="text/css" />

    <!-- TOASTIFY -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!--end::Global Theme Styles-->
    <!--begin::Layout Themes(used by all pages)-->
    <link href="../theme/css/themes/layout/header/base/light.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/themes/layout/header/menu/light.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/themes/layout/brand/dark.css" rel="stylesheet" type="text/css" />
    <link href="../theme/css/themes/layout/aside/dark.css" rel="stylesheet" type="text/css" />
    <!--end::Layout Themes-->
    <link rel="shortcut icon" href="../theme/favicon/logo.ico" />
    <style>
        .quick-links {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .quick-link {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            background: #f3f6f9;
            color: #3699FF;
            font-weight: 600;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.25s ease;
            border: 1px solid transparent;
        }

            .quick-link i {
                font-size: 14px;
            }

            .quick-link:hover {
                background: #3699FF;
                color: #fff;
                border-color: #3699FF;
                transform: translateY(-2px);
                box-shadow: 0 4px 12px rgba(54, 153, 255, 0.25);
            }

        /* ----- Enhanced Login Toggle Styles (Client Active) ----- */
        .login-tabs {
            display: flex;
            gap: 20px;
            background: #f8f9fc;
            padding: 6px;
            border-radius: 60px;
            width: fit-content;
            margin-bottom: 25px;
            border: 1px solid #e9ecef;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .login-tab {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.3px;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: transparent;
            color: #5b6e8c;
            border: none;
            cursor: pointer;
        }

        .active-client i {
            font-size: 1.1rem;
            color: #ffffff !important;
        }

        .inactive-team i {
            font-size: 1.1rem;
            color: #000000;
        }

        /* Active client tab - vibrant primary style */
        .login-tab.active-client {
            background: linear-gradient(105deg, #3699FF 0%, #1a7fdf 100%);
            color: white !important;
            box-shadow: 0 8px 18px rgba(54, 153, 255, 0.28);
            transform: translateY(-1px);
        }

        /* Inactive team tab */
        .login-tab.inactive-team {
            background: #ffffff;
            color: #3f4d67;
            border: 1px solid #e2e8f0;
        }

            .login-tab.inactive-team:hover {
                background: #eff3f9;
                color: #3699FF !important;
                border-color: #cddfef;
                transform: translateY(-1px);
            }

            /* subtle underline for active state */
            .login-tab.active-client::after {
                display: none;
            }

        /* Adjust form title spacing */
        .welcome-title {
            margin-bottom: 0.5rem;
        }

        .role-hint {
            font-size: 0.85rem;
            background: #f0f7ff;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            color: #3699FF;
            font-weight: 500;
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .login-tab {
                padding: 8px 20px;
                font-size: 0.9rem;
            }

            .login-tabs {
                gap: 12px;
            }
        }
    </style>
</head>
<!--end::Head-->
<!--begin::Body-->

<body id="kt_body"
      class="bg-white quick-panel-right demo-panel-right offcanvas-right header-fixed header-mobile-fixed subheader-enabled aside-enabled aside-fixed aside-minimize-hoverable page-loading">
    <!--begin::Main-->
    <div class="d-flex flex-column flex-root">
        <!--begin::Login-->
        <div class="login login-1 login-signin-on d-flex flex-column flex-lg-row flex-column-fluid bg-white"
             id="kt_login">
            <!--begin::Aside-->
            <div class="login-aside"
                 style="margin:150px 0px 0px 150px; background: url('./theme/images/pdca4m-logo-1.png'); background-repeat:no-repeat; background-size: contain; ">
                <!-- Aside left visual (logo background) -->
            </div>
            <!--begin::Aside-->
            <!--begin::Content-->
            <div class="login-content flex-row-fluid d-flex flex-column justify-content-center position-relative overflow-hidden p-7 mx-auto">
                <!--begin::Content body-->
                <div class="d-flex flex-column-fluid flex-center">
                    <!--begin::Signin-->
                    <div class="login-form login-signin">
                        <!-- UPDATED UI: Client & Team Tabs with "Client" active -->
                        <div class="pb-5 pt-lg-0 pt-3">

                            <!-- Welcome headline & hint (dynamic) -->
                            <h3 class="font-weight-bolder text-dark font-size-h4 font-size-h1-lg welcome-title">
                                Welcome to Food<br />
                                Compliance Management
                            </h3>
                            <!--<div class="role-hint" id="activeRoleHint">
                                <i class="fas fa-building"></i> Client portal — access your compliance dashboard
                            </div>-->
                        </div>

                        <!-- FORM STARTS (client login form, but team will redirect if clicked) -->
                        <form class="form" novalidate="novalidate" id="kt_login_signin_form" onsubmit="return false">
                            <div class="login-tabs" role="tablist" aria-label="Login type">
                                <!-- Client Login - ACTIVE (highlighted) -->
                                <a href="/clientlogin.html"
                                   id="clientTabBtn"
                                   class="login-tab active-client"
                                   data-type="client">
                                    <i class="fas fa-user-check"></i>
                                    <span>Client Login</span>
                                </a>
                                <!-- Team Login - inactive (secondary) -->
                                <a href="/teamlogin.html"
                                   id="teamTabBtn"
                                   class="login-tab inactive-team"
                                   data-type="team">
                                    <i class="fas fa-users"></i>
                                    <span>Team Login</span>
                                </a>
                            </div>
                            <!-- Form group: Email -->
                            <div class="form-group">
                                <label class="font-size-h6 font-weight-bolder text-dark">Email</label>
                                <input class="form-control form-control-solid h-auto p-6 rounded-lg" id="clientUserName"
                                       type="text" name="username" autocomplete="off" placeholder="client@company.com" />
                            </div>
                            <!-- Form group: Password -->
                            <div class="form-group">
                                <div class="d-flex justify-content-between mt-n5">
                                    <label class="font-size-h6 font-weight-bolder text-dark pt-5">Password</label>
                                    <a href="client_ForgetPassword.html"
                                       class="text-primary font-size-h6 font-weight-bolder text-hover-primary pt-5"
                                       id="kt_login_forgot">Forgot Password ?</a>
                                </div>

                                <div class="position-relative">
                                    <input class="form-control form-control-solid h-auto p-6 rounded-lg pr-12"
                                           type="password"
                                           name="password"
                                           id="clientPassword"
                                           autocomplete="off"
                                           placeholder="••••••••" />
                                    <!-- Eye Icon -->
                                    <span onclick="togglePassword()"
                                          style="position:absolute; right:15px; top:50%; transform:translateY(-50%); cursor:pointer;">
                                        <i id="eyeIcon" class="fa fa-eye"></i>
                                    </span>
                                </div>
                            </div>
                            <!-- Action Buttons & additional info -->
                            <div class="pb-lg-0 pb-5">
                                <button type="submit" id="kt_login_signin_submit"
                                        class="btn btn-primary font-weight-bolder font-size-h6 px-8 py-4 my-3 mr-3">
                                    Sign In <i class="fas fa-arrow-right ml-2"></i>
                                </button>

                                <div class="mt-3">
                                    <i class="fa-solid fa-bell pr-1" style="color: #3699FF"></i>
                                    <span>Do you want to join our Q-Network? Reach us : </span>
                                    <div class="mt-1">
                                        <a target="_blank" href="mailto:contact@pioneerfoods.in">contact@pioneerfoods.in</a> ,
                                        <a target="_blank" href="tel:7337441144">+91 7337441144</a>
                                    </div>
                                </div>

                                <!-- Quick Links Row (extended) -->
                                <div class="quick-links">

                                    <a href="https://pdcaskill.in/" target="_blank" class="quick-link">
                                        <i class="fa fa-graduation-cap"></i>
                                        <span>PDCA Skill.in</span>
                                    </a>
                                    <a href="https://pdcaaudit.in/" target="_blank" class="quick-link">
                                        <i class="fa fa-file-alt"></i>
                                        <span>PDCA Audit.in</span>
                                    </a>
                                </div>
                            </div>
                        </form>
                    </div>
                    <!--end::Signin-->
                </div>
                <!--end::Content body-->
            </div>
            <!--end::Content-->
        </div>
        <!--end::Login-->
    </div>

    <!--begin::SPINNER-->
    <div id="spinnerOverlay" style="display:none;">
        <div class="loaders"></div>
    </div>
    <!--end::SPINNER-->
    <!--end::Main-->

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!--begin::Global Theme Bundle-->
    <script src="../../theme/plugins/global/plugins.bundle1036.js?v=2.1.1"></script>
    <script src="../../theme/plugins/custom/prismjs/prismjs.bundle1036.js?v=2.1.1"></script>
    <!-- TOASTIFY -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="/js/Client/clientlogin.js"></script>
    <!--end::Global Theme Bundle-->
    <!-- Custom handling for active UI & login behavior -->
    <script type="module">
        // Import client login logic dynamically (if needed)
        // but we also preserve the original module but ensure UI enhancements

        // Additional UI synchronization: active tab, team redirect, tooltips
        const clientTab = document.getElementById('clientTabBtn');
        const teamTab = document.getElementById('teamTabBtn');
        const roleHintSpan = document.getElementById('activeRoleHint');
        const signinButton = document.getElementById('kt_login_signin_submit');
        const emailInput = document.getElementById('clientUserName');
        const passwordInput = document.getElementById('clientPassword');
        const forgotLink = document.getElementById('kt_login_forgot');

        // track current mode (client is primary, but team link will be explicit navigation)
        let currentMode = 'client';   // client / team (team will redirect)

        // Helper to update active UI for client (full client style)
        function setActiveClientUI() {
            clientTab.classList.add('active-client');
            clientTab.classList.remove('inactive-team');
            teamTab.classList.add('inactive-team');
            teamTab.classList.remove('active-client');
            // update role hint
            roleHintSpan.innerHTML = '<i class="fas fa-building"></i> Client portal — access your compliance dashboard';
            // update forgot password link to client version
            forgotLink.href = 'client_ForgetPassword.html';
            // small placeholder / label adaptation
            emailInput.placeholder = 'client@company.com';
            // ensure form action remains client oriented
            currentMode = 'client';
        }

        // function to switch to Team mode? Since team login is separate page, we actually redirect.
        // But we want a smooth UX: when clicking "Team Login" tab, we navigate to teamlogin.html (as per original intent)
        // However the requirement says "update the links of client login and team login ui and make client as active"
        // So we keep client as active, but team tab will behave as a link to /teamlogin.html (or relative)
        // This maintains consistency: both actions clear but client tab stays visually active on this page.
        function handleTeamRedirect(e) {
            e.preventDefault();
            // optional subtle toast
            if (typeof Toastify === 'function') {
                Toastify({
                    text: "Redirecting to Team Login Portal...",
                    duration: 1500,
                    gravity: "top",
                    position: "right",
                    backgroundColor: "#4a90e2",
                    stopOnFocus: true,
                }).showToast();
            }
            setTimeout(() => {
                window.location.href = '/teamlogin.html';
            }, 180);
        }

        // Also, ensure that if user clicks on the existing "Team Login" quick link, it's fully functional
        // but we already have the quick-links with proper target. Also attach event to tab.
        teamTab.addEventListener('click', handleTeamRedirect);

        // For client tab: just set active and ensure we stay on client page (prevent default if any)
        clientTab.addEventListener('click', (e) => {
            e.preventDefault();
            if (currentMode === 'client') return;
            setActiveClientUI();
            // after making client active, reset any error styling
            if (typeof Toastify === 'function') {
                Toastify({
                    text: "✓ Client login mode active",
                    duration: 1500,
                    gravity: "top",
                    position: "right",
                    style: { background: "linear-gradient(135deg, #3699FF, #1a6ec2)" }
                }).showToast();
            }
        });

        // ensure client is active by default on load (double-check)
        setActiveClientUI();

        // Since we have the original clientlogin.js module which includes submit handler,
        // we need to make sure the submit event still works. we will also bind additional validation
        // or just let the existing module handle it. However because we are using type="module" with import,
        // we must ensure it does not conflict. The clientlogin.js probably sets up its own handler.
        // But to guarantee no double submission, we attach a secondary safety but the main submission
        // will be handled by original script. But we also can add custom fallback toast for demo.
        // To be safe: If original signin is not triggered (module failure), we add submit handler.
        // Also we prevent default of the form.
        const existingForm = document.getElementById('kt_login_signin_form');
        // Because the external clientlogin.js might override, we do not conflict. just attach extra indicator.
        if (signinButton) {
            // just provide additional feedback: but the main fire will be from clientlogin.js
            // No duplication: form onsubmit returns false is already set.
        }

        // Additional password toggle (already global)
        window.togglePassword = function () {
            const passwordField = document.getElementById("clientPassword");
            const eyeIcon = document.getElementById("eyeIcon");
            if (passwordField.type === "password") {
                passwordField.type = "text";
                eyeIcon.classList.remove("fa-eye");
                eyeIcon.classList.add("fa-eye-slash");
            } else {
                passwordField.type = "password";
                eyeIcon.classList.remove("fa-eye-slash");
                eyeIcon.classList.add("fa-eye");
            }
        };

        // fix for quick-links to open in new tab already have target _blank, fine
        // also to match both tabs: extra refinements - ensure that if any form error occurs from client login module,
        // we preserve visual consistency. Also disable any team tab accidental form submission.
        const teamQuickLink = document.querySelector('.quick-link[href="https://pdca.in/teamlogin.html"]');
        if (teamQuickLink) {
            teamQuickLink.addEventListener('click', (e) => {
                // optional but no conflict
            });
        }

        // Show spinner when signin clicked? we can rely on clientlogin.js's loading behavior
        // Ensure that the spinnerOverlay is managed by original script but also added small style for loader.
        const spinner = document.getElementById('spinnerOverlay');
        if (spinner) {
            spinner.style.display = 'none';
        }

        // Final polish: if the external clientlogin.js fails for any reason, create a fallback demo-friendly alert.
        // But we want to keep overall robustness: listen for form submit and invoke client actions cautiously.
        let externalHandlerAttached = false;
        // Wait to see if submit event is already bound (by module). To avoid double we don't push another identical handler.
        // Instead we just wrap small console.
        // Also to prevent conflict, we just note that active UI is client.
        console.log("PDCA Client Login Active — client portal ready");

        // Additionally: if the user tries to submit empty fields, default module shows toast, but we add an extra visual,
        // but we rely on library.
        document.querySelector('#kt_login_signin_form').addEventListener('submit', function (e) {
            // let the actual module process it; we only use this to update active client UI consistency.
            // but we also ensure that if currentMode == 'team' (should not happen because team tab redirects)
            if (currentMode === 'team') {
                e.preventDefault();
                handleTeamRedirect(e);
            }
        });

        // set initial active state fully client.
        // Fix for Forgot Password link: ensure it's pointing to client_ForgetPassword.html. Already done in setActiveClientUI
        // Additional improvement: highlight active border on client tab
        // Set the page title clarity
        document.title = "PDCA4M | Client Login Portal";
    </script>

    <!-- Fallback (non-module) to ensure team tab redirection works even if module fails -->
    <script>
        (function () {
            // ensure DOM fully loaded
            document.addEventListener('DOMContentLoaded', function () {
                const teamTabBtn = document.getElementById('teamTabBtn');
                const clientTabBtn = document.getElementById('clientTabBtn');

                if (teamTabBtn && !teamTabBtn.hasAttribute('data-handled')) {
                    teamTabBtn.setAttribute('data-handled', 'true');
                    teamTabBtn.addEventListener('click', function (e) {
                        e.preventDefault();
                        // safe redirect to team login page
                        window.location.href = '/teamlogin.html';
                    });
                }
                // re-check active client UI style persistence in case of any script override
                const clientTab = document.getElementById('clientTabBtn');
                const teamTab = document.getElementById('teamTabBtn');
                if (clientTab && !clientTab.classList.contains('active-client')) {
                    clientTab.classList.add('active-client');
                    if (teamTab) teamTab.classList.add('inactive-team');
                }
                // update forgot password link if changed by another script
                const forgotLink = document.getElementById('kt_login_forgot');
                if (forgotLink && forgotLink.getAttribute('href') !== 'client_ForgetPassword.html') {
                    forgotLink.setAttribute('href', 'client_ForgetPassword.html');
                }
                // small eye icon fallback
                if (typeof window.togglePassword !== 'function') {
                    window.togglePassword = function () {
                        const pwd = document.getElementById('clientPassword');
                        const eye = document.getElementById('eyeIcon');
                        if (pwd.type === 'password') {
                            pwd.type = 'text';
                            eye.classList.remove('fa-eye');
                            eye.classList.add('fa-eye-slash');
                        } else {
                            pwd.type = 'password';
                            eye.classList.remove('fa-eye-slash');
                            eye.classList.add('fa-eye');
                        }
                    };
                }
            });
        })();
    </script>
    <!-- Additional custom styles for modern look and to match active client visual -->
    <style>
        .btn-primary {
            background: linear-gradient(100deg, #3699FF, #187de4);
            border: none;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(54,153,255,0.2);
        }

            .btn-primary:hover {
                transform: translateY(-1px);
                background: linear-gradient(100deg, #288ae9, #0f6bc9);
                box-shadow: 0 10px 20px rgba(54,153,255,0.3);
            }

        .form-control-solid:focus {
            border-color: #3699FF;
            box-shadow: 0 0 0 2px rgba(54,153,255,0.25);
        }

        .login-tab.active-client i {
            filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
        }

        .role-hint {
            background: #eef4fe;
            backdrop-filter: blur(2px);
        }

        a.text-primary {
            font-weight: 600;
        }

        .quick-link {
            background: white;
            border: 1px solid #e4e9f2;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }

            .quick-link:hover {
                background: #3699FF;
                transform: translateY(-3px);
            }
    </style>

    <!-- make sure we load clientlogin.js module gracefully; but note type="module" already imported -->
    <!-- Also for toastify fallback -->
    <script type="module">
        // extra integration: if clientlogin.js exports anything we just rely, but we ensure no double initialization.
        // This helps to keep the original login handler works.
        // We also add a subtle preloader removal after load.
        window.addEventListener('load', function () {
            const body = document.getElementById('kt_body');
            if (body && body.classList.contains('page-loading')) {
                setTimeout(() => {
                    body.classList.remove('page-loading');
                }, 300);
            }
            // set spinner hide initially
            const spin = document.getElementById('spinnerOverlay');
            if (spin) spin.style.display = 'none';
        });
    </script>
    <!-- Eye icon script already present inline + backup -->
</body>
<!--end::Body-->

</html>
