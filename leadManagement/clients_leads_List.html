    <style>
        .spinner_loading {
            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 9999;
            display: none;
        }

        /* Ensure table is responsive */
        .table-responsive {
            overflow-x: auto;
        }

        /* Style for delete button */
        .btn-delete {
            margin: 0 2px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9998;
            display: none;
        }

        /* Dropdown styling */
        .sheet-selector {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-right: 20px;
        }

            .sheet-selector label {
                margin: 0;
                font-weight: 600;
                color: #3F4254;
            }

            .sheet-selector select {
                padding: 8px 15px;
                border-radius: 6px;
                border: 1px solid #E4E6EF;
                background: white;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.3s ease;
            }

                .sheet-selector select:hover {
                    border-color: #3E97FF;
                }

                .sheet-selector select:focus {
                    outline: none;
                    border-color: #3E97FF;
                    box-shadow: 0 0 0 2px rgba(62,151,255,0.1);
                }

        .active-sheet {
            background: linear-gradient(135deg, #3E97FF 0%, #844AFF 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
    </style>
